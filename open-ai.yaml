openapi: 3.0.3
info:
  title: Payment & Webhook API
  description: |
    API for creating payments and registering dynamic webhooks.
    Payments include first name, last name, zip code, card number (encrypted on storage), amount, status, method, and currency.
    Webhooks receive POST requests with payment details after a new payment is created.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /payments:
    post:
      summary: Create a new payment
      description: Accepts payment details and stores the payment securely. Calls all registered webhooks asynchronously.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Bad Request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized – invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while processing payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhooks:
    post:
      summary: Register a new webhook
      description: |
        Registers a dynamic webhook URL that will receive POST requests with payment details whenever a new payment is created.
        Failed webhook deliveries are retried up to 3 times with a 1-second interval between attempts. Clients should ensure idempotency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookRequest'
      responses:
        '201':
          description: Webhook registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
        '400':
          description: Bad Request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error while registering webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    PaymentRequest:
      type: object
      required:
        - name
        - lastName
        - zipCode
        - cardNumber
        - amount
        - method
        - status
        - currency
      properties:
        name:
          type: string
          description: First name of the customer
          example: John
          pattern: "^[A-Za-z -]+$"
        lastName:
          type: string
          description: Last name of the customer
          example: Doe
          pattern: "^[A-Za-z -]+$"
        zipCode:
          type: string
          description: Postal code (4 digits)
          example: "1234"
          pattern: "^[0-9]{4}$"
        cardNumber:
          type: string
          description: Card number (stored encrypted)
          example: "4111111111111111"
          pattern: "^[0-9]{16}$"
        amount:
          type: number
          format: double
          description: Payment amount
          example: 2000.00
        method:
          type: string
          description: Payment method
          enum: [CREDIT_CARD, DEBIT_CARD]
          example: CREDIT_CARD
        status:
          type: string
          description: Payment status
          enum: [PENDING, SUCCESS, FAILED, CANCELLED]
          example: PENDING
        currency:
          type: string
          description: Currency code
          example: AUD

    PaymentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 123
        name:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        amount:
          type: number
          format: double
          example: 2000.00
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, CANCELLED]
          example: PENDING
        method:
          type: string
          enum: [CREDIT_CARD, DEBIT_CARD]
          example: CREDIT_CARD
        createdAt:
          type: string
          format: date-time
          example: 2026-03-28T10:27:25.036898Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-28T10:27:25.036898Z

    WebhookRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Webhook endpoint URL
          example: https://mywebhook.site/receive
          maxLength: 255
          pattern: "^https?://.*"

    WebhookResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 123
        url:
          type: string
          example: https://mywebhook.site/receive
        createdAt:
          type: string
          format: date-time
          example: 2026-03-28T10:27:25.036898Z

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: "firstName: Name is required"
        timestamp:
          type: string
          format: date-time
          example: 2026-03-28T10:50:00Z